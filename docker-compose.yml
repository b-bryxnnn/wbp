version: '3.8'
services:
  app:
    build: .
    container_name: wbp-nextjs
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://wbp_user:wbp_pass@db:5432/wbp_db}
      - JWT_SECRET=${JWT_SECRET:-super-secret-local-key}
      - SOCKET_IO_PATH=/api/socket
    depends_on:
      - db
    volumes:
      - .:/app
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: wbp-postgres
    environment:
      POSTGRES_DB: wbp_db
      POSTGRES_USER: wbp_user
      POSTGRES_PASSWORD: wbp_pass
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: wbp-adminer
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  pgdata:

